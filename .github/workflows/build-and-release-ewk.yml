name: Build and Release EWK Frontend

on:
  push:
    branches:
      - dev-ewk
      - ftr/23-dockerimage-release
    tags:
      - "v*"
      - "release-*"

env:
  IMAGE_NAME_GHCR: ghcr.io/korngold-werkausgabe/eof-ewk:latest
  IMAGE_NAME_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME }}/eof-ewk:latest

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          submodules: true

      # ----------- Build with Sencha CMD ---------
      - name: Clone Sencha-CMD-Docker
        run: git clone https://github.com/bwbohl/sencha-cmd.git

      - name: Build Sencha-CMD-Image
        run: |
          cd sencha-cmd
          docker buildx build --platform linux/amd64 -t local/sencha-cmd:latest --load .

      - name: Build with Sencha-CMD-Docker
        run: docker run --rm -v $PWD:/app -w /app local/sencha-cmd:latest "./build.sh"

      # ----------- NGINX Config and Entrypoint Creation -----------
      - name: Create nginx.conf
        run: |
          cat <<'EOF' > nginx.conf
          server {
              listen 80;
              server_name _;
              root   /usr/share/nginx/html;
              index  index.html;

              location / {
                  try_files $uri $uri/ /index.html;
                  add_header 'Access-Control-Allow-Origin' '*' always;
                  add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                  add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
                  add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
                  if ($request_method = 'OPTIONS') {
                      add_header 'Access-Control-Max-Age' 1728000;
                      add_header 'Content-Type' 'text/plain charset=UTF-8';
                      add_header 'Content-Length' 0;
                      return 204;
                  }
              }
          }
          EOF

      - name: Create entrypoint.sh for ENV injection
        run: |
          cat <<'EOF' > entrypoint.sh
          #!/bin/sh
          set -e
          cat <<EOC > /usr/share/nginx/html/config.json
          {
            "APP_PATH": "${APP_PATH:-/}",
            "BACKEND_PATH": "${BACKEND_PATH:-/}",
            "BACKEND_URL": "${BACKEND_URL:-http://localhost:8080/exist/apps/Edirom-Online-Backend}"
          }
          EOC
          exec nginx -g 'daemon off;'
          EOF
          chmod +x entrypoint.sh

      # ------------- Docker Registries Login & Buildx Setup ----------
      - name: Login to GitHub Packages Docker
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ------------ Docker Image Build & Push (multiarch, with Config) ----------
      - name: Build and push multiarch image (Nginx)
        env:
          IMAGE_NAME_GHCR: ghcr.io/korngold-werkausgabe/eof-ewk:latest
          IMAGE_NAME_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME }}/eof-ewk:latest
        run: |
          cat <<'EOF' > Dockerfile
          FROM nginx:alpine
          COPY build/ /usr/share/nginx/html
          COPY nginx.conf /etc/nginx/conf.d/default.conf
          COPY entrypoint.sh /entrypoint.sh
          RUN chmod +x /entrypoint.sh
          ENTRYPOINT ["/entrypoint.sh"]
          EOF

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t $IMAGE_NAME_GHCR \
            -t $IMAGE_NAME_DOCKERHUB \
            --push .

      # ---------------- Optional: Build-Artifact ---------------
      - name: Create eof-ewk-latest.tar.gz
        run: tar -czf eof-ewk-latest.tar.gz build

      - name: Upload eof-ewk-latest.tar.gz as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: eof-ewk-latest.tar.gz
          path: eof-ewk-latest.tar.gz

      - name: Upload eof-ewk-latest.tar.gz as Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: eof-ewk-latest.tar.gz