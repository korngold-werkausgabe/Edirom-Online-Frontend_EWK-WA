name: Build and Release EWK Frontend

on:
  push:
    branches:
      - dev-ewk
      - ftr/23-dockerimage-release
    tags:
      - 'v*'
      - 'release-*'

env:
  IMAGE_NAME: eof-ewk
  IMAGE_NAME_GHCR: ghcr.io/korngold-werkausgabe/eof-ewk:latest
  IMAGE_NAME_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME }}/eof-ewk:latest

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      # --- Build with Sencha ---
      - name: Clone sencha-cmd helper
        run: git clone https://github.com/bwbohl/sencha-cmd.git .sencha-cmd

      - name: Build Sencha-CMD Docker Image
        run: docker build -t sencha-cmd .sencha-cmd

      - name: Build App with build.sh
        run: docker run --rm -v $PWD:/workspace -w /workspace sencha-cmd bash ./build.sh

      # --- Archive build directory ---
      - name: Create eof-ewk-latest.tar.gz
        run: tar -czf eof-ewk-latest.tar.gz build

      # --- Build Docker image with NGINX ---
      - name: Login to GitHub Packages Docker
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image with latest tag (Nginx)
        run: |
          cat <<EOF > Dockerfile
          FROM nginx:alpine
          COPY build/ /usr/share/nginx/html
          EOF
          docker build -t $IMAGE_NAME_GHCR -t $IMAGE_NAME_DOCKERHUB .

      # --- Release build.tar.gz ---
      - name: Upload eof-ewk-latest.tar.gz as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: eof-ewk-latest.tar.gz
          path: eof-ewk-latest.tar.gz

      - name: Upload eof-ewk-latest.tar.gz as Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: eof-ewk-latest.tar.gz

      # --- Push Docker Images ---
      - name: Push Docker image to GitHub Container Registry
        run: |
          docker push $IMAGE_NAME_GHCR

      - name: Push Docker image to DockerHub
        run: |
          docker push $IMAGE_NAME_DOCKERHUB