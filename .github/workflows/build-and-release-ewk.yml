name: Build and Release EWK Frontend

on:
  push:
    branches:
      - dev-ewk
      - ftr/23-dockerimage-release
    tags:
      - "v*"
      - "release-*"

env:
  IMAGE_NAME: eof-ewk
  IMAGE_NAME_GHCR: ghcr.io/korngold-werkausgabe/eof-ewk:latest
  IMAGE_NAME_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME }}/eof-ewk:latest

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      # --- Build with Sencha ---
      - name: Clone Sencha-CMD-Docker
        run: git clone https://github.com/bwbohl/sencha-cmd.git

      - name: Build Sencha-CMD-Image
        run: |
          cd sencha-cmd
          docker buildx build --platform linux/amd64 -t local/sencha-cmd:latest --load .

      - name: Build mit Sencha-CMD-Docker
        run: docker run --rm -v $PWD:/app -w /app local/sencha-cmd:latest "./build.sh"

      # --- Archive build directory ---
      - name: Create eof-ewk-latest.tar.gz
        run: tar -czf eof-ewk-latest.tar.gz build

      # --- Login to Registries ---
      - name: Login to GitHub Packages Docker
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Create nginx.conf inline
        run: |
          cat <<'EOF' > nginx.conf
          server {
              listen 80;
              server_name _;
              root   /usr/share/nginx/html;
              index  index.html;

              location / {
                  try_files $uri $uri/ /index.html;
                  add_header 'Access-Control-Allow-Origin' '*' always;
                  add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                  add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
                  add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
                  if ($request_method = 'OPTIONS') {
                      add_header 'Access-Control-Max-Age' 1728000;
                      add_header 'Content-Type' 'text/plain charset=UTF-8';
                      add_header 'Content-Length' 0;
                      return 204;
                  }
              }
          }
          EOF
      # --- Set up Docker Buildx (fixes multiarch issue!) ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Build and push multiarch image with NGINX ---
      - name: Build Docker image with latest tag (Nginx)
        env:
          IMAGE_NAME_GHCR: ghcr.io/korngold-werkausgabe/eof-ewk:latest
          IMAGE_NAME_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME }}/eof-ewk:latest
        run: |
          cat <<'EOF' > Dockerfile
          FROM nginx:alpine
          COPY build/ /usr/share/nginx/html
          COPY nginx.conf /etc/nginx/conf.d/default.conf
          EOF

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t $IMAGE_NAME_GHCR \
            -t $IMAGE_NAME_DOCKERHUB \
            --push .

      # --- Release build.tar.gz ---
      - name: Upload eof-ewk-latest.tar.gz as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: eof-ewk-latest.tar.gz
          path: eof-ewk-latest.tar.gz

      - name: Upload eof-ewk-latest.tar.gz as Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: eof-ewk-latest.tar.gz