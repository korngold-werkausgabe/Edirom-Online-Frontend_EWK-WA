name: Build and Release EWK Frontend

on:
  push:
    branches:
      - dev-ewk
      - ftr/ftr/23-dockerimage-release
    tags:
      - 'v*'
      - 'release-*'

env:
  IMAGE_NAME: eof-ewk
  IMAGE_NAME_GHCR: ghcr.io/korngold-werkausgabe/eof-ewk:latest
  IMAGE_NAME_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME }}/eof-ewk:latest

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      # --- Build XAR mit Sencha ---
      - name: Clone sencha-cmd helper
        run: git clone https://github.com/bwbohl/sencha-cmd.git .sencha-cmd

      - name: Build Sencha-CMD Docker Image
        run: docker build -t sencha-cmd .sencha-cmd

      - name: Build XAR with build.sh
        run: docker run --rm -v $PWD:/workspace -w /workspace sencha-cmd bash ./build.sh

      - name: Copy XAR to fixed file name
        # Passe bei Bedarf den Pfad zur XAR an, falls notwendig
        run: cp build-xar/*.xar eof-ewk-latest.xar

      # --- Build Dockerimage ---
      - name: Login to GitHub Packages Docker
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image with latest tag
        run: |
          docker build -t $IMAGE_NAME_GHCR -t $IMAGE_NAME_DOCKERHUB .

      # --- Release XAR ---
      - name: Upload XAR as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: eof-ewk-latest.xar
          path: eof-ewk-latest.xar

      - name: Upload XAR as Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: eof-ewk-latest.xar

      # --- Release Dockerimage ---
      - name: Push Docker image to GitHub Container Registry
        run: |
          docker push $IMAGE_NAME_GHCR

      - name: Push Docker image to DockerHub
        run: |
          docker push $IMAGE_NAME_DOCKERHUB