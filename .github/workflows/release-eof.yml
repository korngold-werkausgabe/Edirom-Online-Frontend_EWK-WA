name: release-eof

on:
  workflow_dispatch:
    inputs:
      build_sha:
        description: "Git SHA of the build to release"
        required: false
        type: string
      run_id:
        description: "Run ID where the artifact was created"
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Determine build SHA
        id: build_sha
        run: |
          if [ -n "${{ inputs.build_sha }}" ]; then
            echo "sha=${{ inputs.build_sha }}" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Determine run ID
        id: run_info
        run: |
          if [ -n "${{ inputs.run_id }}" ]; then
            echo "run_id=${{ inputs.run_id }}" >> $GITHUB_OUTPUT
          else
            echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Download XAR artifact
        uses: actions/download-artifact@v4
        with:
          name: eof-ewk-xar-${{ steps.build_sha.outputs.sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.run_info.outputs.run_id }}

      - name: Download build folder artifact
        uses: actions/download-artifact@v4
        with:
          name: eof-ewk-build-${{ steps.build_sha.outputs.sha }}
          path: eof-ewk-build
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.run_info.outputs.run_id }}

      - name: Rename XAR file
        run: |
          mv Edirom-Online-Frontend*.xar eof-ewk-latest.xar

      - name: Archive build folder
        run: |
          tar -czf eof-ewk-build.tar.gz eof-ewk-build

      - name: Get or Create Release
        id: get_release
        uses: actions/github-script@v6
        with:
          script: |
            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: 'latest'
              });
            } catch (error) {
              if (error.status === 404) {
                release = await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: 'latest',
                  name: 'Latest Release',
                  draft: false,
                  prerelease: false
                });
                console.log('Release created with tag "latest".');
              } else {
                throw error;
              }
            }
            core.setOutput('release_id', release.data.id);
            core.setOutput('upload_url', release.data.upload_url);

      - name: Delete old assets if existif exist
        uses: actions/github-script@v6
        env:
          RELEASE_ID: ${{ steps.get_release.outputs.release_id }}
        with:
          script: |
            const release_id = process.env.RELEASE_ID;
            const asset_names = ['eof-ewk-latest.xar', 'eof-ewk-build.tar.gz'];
            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release_id
            });
            for (const asset of assets) {
              if (asset_names.includes(asset.name)) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id
                });
                console.log(`Deleted old asset: ${asset.name}`);
              }
            }

      - name: Upload XAR to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.get_release.outputs.upload_url }}
          asset_path: ./eof-ewk-latest.xar
          asset_name: eof-ewk-latest.xar
          asset_content_type: application/octet-stream

      - name: Upload build folder to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.get_release.outputs.upload_url }}
          asset_path: ./eof-ewk-build.tar.gz
          asset_name: eof-ewk-build.tar.gz
          asset_content_type: application/gzip
