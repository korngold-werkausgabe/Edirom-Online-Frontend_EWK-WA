name: release-docker-image

on:
  workflow_dispatch:
    inputs:
      build_sha:
        description: "Git SHA of the Docker image to release (leave empty for latest)"
        required: false
        type: string
      run_id:
        description: "Run ID of the Docker build workflow (leave empty for current run)"
        required: false
        type: string
  repository_dispatch:
    types:
      - docker-build-ready-for-release

env:
  DOCKER_IMAGE: korngold-werkausgabe/edirom-online-frontend-ewk
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/edirom-online-frontend-ewk

jobs:
  release-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Determine build SHA and run ID
        id: build_info
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ -n "${{ inputs.build_sha }}" ]; then
              echo "sha=${{ inputs.build_sha }}" >> $GITHUB_OUTPUT
            else
              echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
            fi
            if [ -n "${{ inputs.run_id }}" ]; then
              echo "run_id=${{ inputs.run_id }}" >> $GITHUB_OUTPUT
            else
              echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "sha=${{ github.event.client_payload.sha }}" >> $GITHUB_OUTPUT
            echo "run_id=${{ github.event.client_payload.run_id }}" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ steps.build_info.outputs.sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.build_info.outputs.run_id }}  # ← KORRIGIERT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Load Docker image
        run: |
          docker load --input docker-image.tar
          docker image ls -a

      - name: Verify loaded image
        run: |
          SOURCE_IMAGE="korngold-werkausgabe/edirom-online-frontend-ewk:${{ steps.build_info.outputs.sha }}"
          if ! docker image inspect "$SOURCE_IMAGE" > /dev/null 2>&1; then
            echo "Error: Expected image $SOURCE_IMAGE not found after loading!"
            echo "Available images:"
            docker images
            exit 1
          fi
          echo "Successfully verified image: $SOURCE_IMAGE"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker Hub
        id: meta_dockerhub
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for GHCR
        id: meta_ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Tag and push to Docker Hub
        run: |
          SOURCE_IMAGE="${{ steps.load_image.outputs.loaded_image }}"
          
          # Tag for Docker Hub
          echo "${{ steps.meta_dockerhub.outputs.tags }}" | while read tag; do
            if [ -n "$tag" ]; then
              echo "Tagging and pushing: $tag"
              docker tag "$SOURCE_IMAGE" "$tag"
              docker push "$tag"
            fi
          done

      - name: Tag and push to GitHub Container Registry
        run: |
          SOURCE_IMAGE="${{ steps.load_image.outputs.loaded_image }}"
          
          # Tag for GHCR
          echo "${{ steps.meta_ghcr.outputs.tags }}" | while read tag; do
            if [ -n "$tag" ]; then
              echo "Tagging and pushing: $tag"
              docker tag "$SOURCE_IMAGE" "$tag"
              docker push "$tag"
            fi
          done

      - name: Generate deployment info
        run: |
          cat > deployment-info.md << EOF
          # Docker Image Deployment Info

          ## Available on Docker Hub
          \`\`\`
          ${{ steps.meta_dockerhub.outputs.tags }}
          \`\`\`

          ## Available on GitHub Container Registry
          \`\`\`
          ${{ steps.meta_ghcr.outputs.tags }}
          \`\`\`

          ## Pull Commands

          ### From Docker Hub
          \`\`\`bash
          docker pull ${{ env.DOCKER_IMAGE }}:latest
          \`\`\`

          ### From GitHub Container Registry
          \`\`\`bash
          docker pull ${{ env.GHCR_IMAGE }}:latest
          \`\`\`

          ## Run Command
          \`\`\`bash
          docker run -d \\
            --name edirom-online-frontend \\
            -p 8080:80 \\
            -v \$(pwd)/config.json:/usr/share/nginx/html/config.json:ro \\
            ${{ env.DOCKER_IMAGE }}:latest
          \`\`\`

          ## Docker Compose
          \`\`\`yaml
          version: '3.8'
          services:
            edirom-frontend:
              image: ${{ env.DOCKER_IMAGE }}:latest
              ports:
                - "8080:80"
              volumes:
                - ./config.json:/usr/share/nginx/html/config.json:ro
              restart: unless-stopped
          \`\`\`

          ## Simple Health Check
          \`\`\`bash
          curl -f http://localhost:8080/ || echo "Container not responding"
          \`\`\`
          EOF

      - name: Upload deployment info
        uses: actions/upload-artifact@v4
        with:
          name: deployment-info-${{ steps.build_info.outputs.sha }}
          path: deployment-info.md
          retention-days: 90
