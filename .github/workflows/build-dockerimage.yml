name: Build Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - dev-ewk
  pull_request:
    branches:
      - dev-ewk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jre git

      - name: Copy Sencha CMD Dockerfile
        run: |
          git clone --depth 1 https://github.com/bwbohl/sencha-cmd.git /tmp/sencha-cmd
          cp /tmp/sencha-cmd/Dockerfile ${{ github.workspace }}/Dockerfile

      - name: Build Docker Image
        run: |
          docker build -f ${{ github.workspace }}/Dockerfile -t edirom-online-build .
        working-directory: ${{ github.workspace }}

      - name: Run Build in Container
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app edirom-online-build "./build.sh production"

      - name: Upload build folder artifact
        uses: actions/upload-artifact@v4
        with:
          name: eof-ewk-build-${{ github.sha }}
          path: build
          retention-days: 30

  docker-build:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build folder artifact
        uses: actions/download-artifact@v4
        with:
          name: eof-ewk-build-${{ github.sha }}
          path: build

      - name: Create nginx Dockerfile
        run: |
          cat > Dockerfile << 'EOF'
          FROM nginx:alpine

          # Install curl for health checks
          RUN apk add --no-cache curl

          # Copy custom nginx configuration
          COPY nginx.conf /etc/nginx/nginx.conf

          # Copy built application
          COPY build /usr/share/nginx/html

          # Create config directory
          RUN mkdir -p /usr/share/nginx/html/config

          # Set proper permissions
          RUN chown -R nginx:nginx /usr/share/nginx/html && \
              chmod -R 755 /usr/share/nginx/html

          # Expose port 80
          EXPOSE 80

          # Health check
          HEALTHCHECK --interval=30s --timeout=3s --start-period=5s --retries=3 \
            CMD curl -f http://localhost/health || exit 1

          # Start nginx
          CMD ["nginx", "-g", "daemon off;"]
          EOF

      - name: Create nginx configuration
        run: |
          cat > nginx.conf << 'EOF'
          worker_processes auto;
          error_log /var/log/nginx/error.log warn;
          pid /var/run/nginx.pid;

          events {
              worker_connections 1024;
          }

          http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;

              log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                              '$status $body_bytes_sent "$http_referer" '
                              '"$http_user_agent" "$http_x_forwarded_for"';

              access_log /var/log/nginx/access.log main;

              sendfile on;
              tcp_nopush on;
              tcp_nodelay on;
              keepalive_timeout 65;
              types_hash_max_size 2048;

              # Gzip compression
              gzip on;
              gzip_vary on;
              gzip_min_length 1024;
              gzip_proxied any;
              gzip_comp_level 6;
              gzip_types
                  text/plain
                  text/css
                  text/xml
                  text/javascript
                  application/javascript
                  application/xml+rss
                  application/json;

              server {
                  listen 80;
                  server_name localhost;
                  root /usr/share/nginx/html;
                  index index.html;

                  # Security headers
                  add_header X-Frame-Options "SAMEORIGIN" always;
                  add_header X-XSS-Protection "1; mode=block" always;
                  add_header X-Content-Type-Options "nosniff" always;
                  add_header Referrer-Policy "no-referrer-when-downgrade" always;
                  add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

                  # Handle config.json requests
                  location = /config.json {
                      try_files $uri $uri/ =404;
                      add_header Cache-Control "no-cache, no-store, must-revalidate";
                      add_header Pragma "no-cache";
                      add_header Expires "0";
                  }

                  # Static assets with caching
                  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                      expires 1y;
                      add_header Cache-Control "public, immutable";
                  }

                  # Main application
                  location / {
                      try_files $uri $uri/ /index.html;
                      add_header Cache-Control "no-cache, no-store, must-revalidate";
                      add_header Pragma "no-cache";
                      add_header Expires "0";
                  }

                  # Health check endpoint
                  location /health {
                      access_log off;
                      return 200 "healthy\n";
                      add_header Content-Type text/plain;
                  }
              }
          }
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (without push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: edirom/online-frontend-ewk:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          outputs: type=docker,dest=/tmp/docker-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ github.sha }}
          path: /tmp/docker-image.tar
          retention-days: 7
