name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      build_sha:
        description: "Git SHA of the build to use (leave empty for latest)"
        required: false
        type: string
  workflow_run:
    workflows: ["Build Edirom Online Frontend"]
    types:
      - completed
    branches:
      - dev-ewk

jobs:
  docker-build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Determine build SHA
        id: build_sha
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.build_sha }}" ]; then
            echo "sha=${{ inputs.build_sha }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Create workspace directory
        run: mkdir -p /tmp/docker-context

      - name: Download build folder artifact
        uses: actions/download-artifact@v4
        with:
          name: eof-ewk-build-${{ steps.build_sha.outputs.sha }}
          path: /tmp/docker-context/build
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id || github.run_id }}

      - name: Create nginx Dockerfile
        run: |
          cat > /tmp/docker-context/Dockerfile << 'EOF'
          FROM nginx:alpine

          COPY nginx.conf /etc/nginx/nginx.conf
          COPY build/ /usr/share/nginx/html/

          RUN mkdir -p /usr/share/nginx/html/config

          EXPOSE 80

          CMD ["nginx", "-g", "daemon off;"]
          EOF

      - name: Create nginx configuration
        run: |
          cat > /tmp/docker-context/nginx.conf << 'EOF'
          events {
              worker_connections 1024;
          }

          http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;

              server {
                  listen 80;
                  root /usr/share/nginx/html;
                  index index.html;
                  
                  location / {
                  }
              }
          }
          EOF

      - name: Build Docker image (without push)
        uses: docker/build-push-action@v5
        with:
          context: /tmp/docker-context
          push: false
          tags: edirom/online-frontend-ewk:${{ steps.build_sha.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          outputs: type=oci,dest=/tmp/docker-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.build_sha.outputs.sha }}
          path: /tmp/docker-image.tar
          retention-days: 7
