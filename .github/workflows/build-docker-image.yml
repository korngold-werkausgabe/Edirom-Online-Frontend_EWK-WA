name: build-docker-image

on:
  workflow_dispatch:
    inputs:
      build_sha:
        description: "Git SHA of the build to use (leave empty for latest)"
        required: false
        type: string
      run_id:
        description: "Run ID of the build workflow (leave empty for current run)"
        required: false
        type: string
  repository_dispatch:
    types:
      - xar-build-complete

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Determine build SHA and run ID
        id: build_info
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ -n "${{ inputs.build_sha }}" ]; then
              echo "sha=${{ inputs.build_sha }}" >> $GITHUB_OUTPUT
            else
              echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
            fi
            if [ -n "${{ inputs.run_id }}" ]; then
              echo "run_id=${{ inputs.run_id }}" >> $GITHUB_OUTPUT
            else
              echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "sha=${{ github.event.client_payload.sha }}" >> $GITHUB_OUTPUT
            echo "run_id=${{ github.event.client_payload.run_id }}" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Create workspace directory
        run: mkdir -p /tmp/docker-context

      - name: Download build folder artifact
        uses: actions/download-artifact@v4
        with:
          name: eof-ewk-build-${{ steps.build_info.outputs.sha }}
          path: /tmp/docker-context/build
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.build_info.outputs.run_id }}

      - name: Create nginx Dockerfile
        run: |
          cat > /tmp/docker-context/Dockerfile << 'EOF'
          FROM nginx:alpine

          COPY nginx.conf /etc/nginx/nginx.conf
          COPY build/ /usr/share/nginx/html/

          RUN mkdir -p /usr/share/nginx/html/config

          EXPOSE 80

          CMD ["nginx", "-g", "daemon off;"]
          EOF

      - name: Create nginx configuration
        run: |
          cat > /tmp/docker-context/nginx.conf << 'EOF'
          events {
              worker_connections 1024;
          }

          http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;

              server {
                  listen 80;
                  root /usr/share/nginx/html;
                  index index.html;
                  
                  location / {
                  }
              }
          }
          EOF

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (without push)
        uses: docker/build-push-action@v5
        with:
          context: /tmp/docker-context
          push: false
          tags: korngold-werkausgabe/edirom-online-frontend-ewk:${{ steps.build_info.outputs.sha }}
          platforms: linux/amd64  # ← NUR EINE PLATFORM für Artifact
          outputs: type=docker,dest=/tmp/docker-image.tar  # ← type=docker statt oci

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.build_info.outputs.sha }}
          path: /tmp/docker-image.tar
          retention-days: 7

      - name: Trigger Docker release workflow
        if: success()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: docker-build-ready-for-release
          client-payload: '{"sha": "${{ steps.build_info.outputs.sha }}", "run_id": "${{ github.run_id }}"}'
