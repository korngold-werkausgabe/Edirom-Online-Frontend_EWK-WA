name: build-docker-image

on:
  workflow_dispatch:
    inputs:
      build_sha:
        description: "Git SHA of the build to use"
        required: false
        type: string
      run_id:
        description: "Run ID where the artifact was created"
        required: false
        type: string

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Determine build SHA
        id: build_sha
        run: |
          if [ -n "${{ inputs.build_sha }}" ]; then
            echo "sha=${{ inputs.build_sha }}" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Determine run ID
        id: run_info
        run: |
          if [ -n "${{ inputs.run_id }}" ]; then
            echo "run_id=${{ inputs.run_id }}" >> $GITHUB_OUTPUT
          else
            echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Create workspace directory
        run: mkdir -p /tmp/docker-context

      - name: Download build folder artifact
        uses: actions/download-artifact@v4
        with:
          name: eof-ewk-build-${{ steps.build_sha.outputs.sha }}
          path: /tmp/docker-context/build
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.run_info.outputs.run_id }}

      - name: Create nginx Dockerfile
        run: |
          cat > /tmp/docker-context/Dockerfile << 'EOF'
          FROM nginx:alpine

          COPY nginx.conf /etc/nginx/nginx.conf
          COPY build/ /usr/share/nginx/html/

          RUN mkdir -p /usr/share/nginx/html/config

          EXPOSE 80

          CMD ["nginx", "-g", "daemon off;"]
          EOF

      - name: Create nginx configuration
        run: |
          cat > /tmp/docker-context/nginx.conf << 'EOF'
          events {
              worker_connections 1024;
          }

          http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;

              server {
                  listen 80;
                  root /usr/share/nginx/html;
                  index index.html;
                  
                  location / {
                  }
              }
          }
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for amd64
        uses: docker/build-push-action@v5
        with:
          context: /tmp/docker-context
          push: false
          tags: edirom/online-frontend-ewk:${{ steps.build_sha.outputs.sha }}-amd64
          platforms: linux/amd64
          outputs: type=docker,dest=/tmp/docker-image-amd64.tar

      - name: Build Docker image for arm64
        uses: docker/build-push-action@v5
        with:
          context: /tmp/docker-context
          push: false
          tags: edirom/online-frontend-ewk:${{ steps.build_sha.outputs.sha }}-arm64
          platforms: linux/arm64
          outputs: type=docker,dest=/tmp/docker-image-arm64.tar

      - name: Upload Docker images as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-${{ steps.build_sha.outputs.sha }}
          path: |
            /tmp/docker-image-amd64.tar
            /tmp/docker-image-arm64.tar
          retention-days: 7

      - name: Trigger release-docker-image
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Trigger release-docker-image workflow on same branch
          gh workflow run release-docker-image.yml \
            --ref ${{ github.ref_name }} \
            -f build_sha=${{ steps.build_sha.outputs.sha }} \
            -f run_id=${{ github.run_id }}
