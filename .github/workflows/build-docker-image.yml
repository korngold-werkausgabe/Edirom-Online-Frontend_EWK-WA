name: build-docker-image

on:
  workflow_dispatch:
    inputs:
      build_sha:
        description: "Git SHA of the build to use"
        required: false
        type: string
      run_id:
        description: "Run ID where the artifact was created"
        required: false
        type: string
  repository_dispatch:
    types: [build-completed]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Determine build SHA
        id: build_sha
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.build_sha }}" ]; then
            echo "sha=${{ inputs.build_sha }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "sha=${{ github.event.client_payload.sha }}" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Determine run ID
        id: run_info
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.run_id }}" ]; then
            echo "run_id=${{ inputs.run_id }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "run_id=${{ github.event.client_payload.run_id }}" >> $GITHUB_OUTPUT
          else
            echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Create workspace directory
        run: mkdir -p /tmp/docker-context

      - name: Download build folder artifact
        uses: actions/download-artifact@v4
        with:
          name: eof-ewk-build-${{ steps.build_sha.outputs.sha }}
          path: /tmp/docker-context/build
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.run_info.outputs.run_id }}

      - name: Create nginx Dockerfile
        run: |
          cat > /tmp/docker-context/Dockerfile << 'EOF'
          FROM nginx:alpine

          COPY nginx.conf /etc/nginx/nginx.conf
          COPY build/ /usr/share/nginx/html/

          RUN mkdir -p /usr/share/nginx/html/config

          EXPOSE 80

          CMD ["nginx", "-g", "daemon off;"]
          EOF

      - name: Create nginx configuration
        run: |
          cat > /tmp/docker-context/nginx.conf << 'EOF'
          events {
              worker_connections 1024;
          }

          http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;

              server {
                  listen 80;
                  root /usr/share/nginx/html;
                  index index.html;
                  
                  location / {
                  }
              }
          }
          EOF

      - name: Build Docker image (without push)
        uses: docker/build-push-action@v5
        with:
          context: /tmp/docker-context
          push: false
          tags: edirom/online-frontend-ewk:${{ steps.build_sha.outputs.sha }}
          platforms: linux/amd64,linux/arm64
          outputs: type=oci,dest=/tmp/docker-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.build_sha.outputs.sha }}
          path: /tmp/docker-image.tar
          retention-days: 7

      - name: Trigger release-docker-image
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d "{\"event_type\":\"release-docker\",\"client_payload\":{\"sha\":\"${{ steps.build_sha.outputs.sha }}\",\"run_id\":\"${{ github.run_id }}\",\"workflow\":\"build-docker-image\"}}"
