name: build-docker-image

on:
  workflow_dispatch:
    inputs:
      build_sha:
        description: "Git SHA of the build to use"
        required: false
        type: string
      run_id:
        description: "Run ID where the artifact was created"
        required: false
        type: string

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Determine build SHA
        id: build_sha
        run: |
          if [ -n "${{ inputs.build_sha }}" ]; then
            echo "sha=${{ inputs.build_sha }}" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Determine run ID
        id: run_info
        run: |
          if [ -n "${{ inputs.run_id }}" ]; then
            echo "run_id=${{ inputs.run_id }}" >> $GITHUB_OUTPUT
          else
            echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Create workspace directory
        run: mkdir -p /tmp/docker-context

      - name: Download build folder artifact
        uses: actions/download-artifact@v4
        with:
          name: eof-ewk-build-${{ steps.build_sha.outputs.sha }}
          path: /tmp/docker-context/build
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.run_info.outputs.run_id }}

      - name: Checkout repository for Docker files
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker
          sparse-checkout-cone-mode: false
          path: repo

      - name: Copy Docker configuration files
        run: |
          mkdir -p /tmp/docker-context/docker
          cp repo/docker/Dockerfile /tmp/docker-context/
          cp repo/docker/nginx.conf /tmp/docker-context/docker/
          cp repo/docker/entrypoint.sh /tmp/docker-context/docker/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for amd64
        uses: docker/build-push-action@v5
        with:
          context: /tmp/docker-context
          push: false
          tags: korngold-werkausgabe/online-frontend-ewk:latest-amd64
          platforms: linux/amd64
          outputs: type=docker,dest=/tmp/docker-image-amd64.tar

      - name: Build Docker image for arm64
        uses: docker/build-push-action@v5
        with:
          context: /tmp/docker-context
          push: false
          tags: korngold-werkausgabe/online-frontend-ewk:latest-arm64
          platforms: linux/arm64
          outputs: type=docker,dest=/tmp/docker-image-arm64.tar

      - name: Upload Docker images as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-${{ steps.build_sha.outputs.sha }}
          path: |
            /tmp/docker-image-amd64.tar
            /tmp/docker-image-arm64.tar
          retention-days: 7

      - name: Trigger release-docker-image
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Trigger release-docker-image workflow on same branch
          gh workflow run release-docker-image.yml \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref_name }} \
            -f build_sha=${{ steps.build_sha.outputs.sha }} \
            -f run_id=${{ github.run_id }}
