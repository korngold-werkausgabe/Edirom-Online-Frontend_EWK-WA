name: Build Edirom Online Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - dev-ewk
  pull_request:
    branches:
      - dev-ewk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jre git

      - name: Copy Sencha CMD Dockerfile
        run: |
          git clone --depth 1 https://github.com/bwbohl/sencha-cmd.git /tmp/sencha-cmd
          cp /tmp/sencha-cmd/Dockerfile ${{ github.workspace }}/Dockerfile

      - name: Build Docker Image
        run: |
          docker build -f ${{ github.workspace }}/Dockerfile -t edirom-online-build .
        working-directory: ${{ github.workspace }}

      - name: Run Build in Container
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app edirom-online-build "./build.sh production"

      - name: Upload XAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: eof-ewk
          path: build-xar/*.xar
  release:
      needs: build
      runs-on: ubuntu-latest
      steps:
        - name: Download XAR Artifact
          uses: actions/download-artifact@v4
          with:
            name: eof-ewk

        - name: Rename XAR file
          run: |
            mv Edirom-Online-Frontend*.xar eof-ewk-latest.xar

        - name: Create Release if not exists
          id: create_release
          uses: actions/github-script@v6
          with:
            script: |
              let release;
              try {
                release = await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag: 'latest'
                });
              } catch (error) {
                if (error.status === 404) {
                  release = await github.rest.repos.createRelease({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    tag_name: 'latest',
                    name: 'Latest Release',
                    draft: false,
                    prerelease: false
                  });
                  console.log('Release created with tag "latest".');
                } else {
                  throw error;
                }
              }
              core.setOutput('release_id', release.data.id);
              core.setOutput('upload_url', release.data.upload_url);

        - name: Get Release by Tag

          id: get_release
          uses: actions/github-script@v6
          with:
            script: |
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: 'latest'
              });
              if (!release.data || !release.data.id) {
                throw new Error('Release with tag "latest" not found!');
              }
              core.setOutput('upload_url', release.data.upload_url);
              core.setOutput('release_id', release.data.id);

        - name: Delete old assets if exist
          uses: actions/github-script@v6
          with:
            script: |
              const release_id = '${{ steps.get_release.outputs.release_id }}';
              const asset_names = ['eof-ewk-latest.xar', 'eof-ewk-build.tar.gz'];
              const { data: assets } = await github.rest.repos.listReleaseAssets({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release_id
              });
              for (const asset of assets) {
                if (asset_names.includes(asset.name)) {
                  await github.rest.repos.deleteReleaseAsset({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    asset_id: asset.id
                  });
                  console.log(`Deleted old asset: ${asset.name}`);
                }
              }

        - name: Upload XAR to Release
          uses: actions/upload-release-asset@v1
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          with:
            upload_url: ${{ steps.get_release.outputs.upload_url }}
            asset_path: ./eof-ewk-latest.xar
            asset_name: eof-ewk-latest.xar
            asset_content_type: application/octet-stream

        - name: Archive build folder
          run: |
            tar -czf eof-ewk-build.tar.gz build

        - name: Upload build folder to Release
          uses: actions/upload-release-asset@v1
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          with:
            upload_url: ${{ steps.get_release.outputs.upload_url }}
            asset_path: ./eof-ewk-build.tar.gz
            asset_name: eof-ewk-build.tar.gz
            asset_content_type: application/gzip