name: Build Edirom Online Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - dev-ewk
  pull_request:
    branches:
      - dev-ewk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jre git

      - name: Copy Sencha CMD Dockerfile
        run: |
          git clone --depth 1 https://github.com/bwbohl/sencha-cmd.git /tmp/sencha-cmd
          cp /tmp/sencha-cmd/Dockerfile ${{ github.workspace }}/Dockerfile

      - name: Build Docker Image
        run: |
          docker build -f ${{ github.workspace }}/Dockerfile -t edirom-online-build .
        working-directory: ${{ github.workspace }}

      - name: Run Build in Container
        run: |
          docker run --rm -v ${{ github.workspace }}:/app edirom-online-build bash -c "ls -l && ./build.sh"

      - name: Upload XAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: edirom-online-frontend-xar
          path: build-xar/*.xar
