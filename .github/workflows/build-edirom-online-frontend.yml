name: Build Edirom Online Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - dev-ewk
  pull_request:
    branches:
      - dev-ewk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jre git

      - name: Clone Sencha CMD Dockerfile
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/bwbohl/sencha-cmd.git /tmp/sencha-cmd
          cd /tmp/sencha-cmd
          git sparse-checkout set Dockerfile

      - name: Build Docker Image
        run: |
          docker build -f /tmp/sencha-cmd/Dockerfile -t ediromonline-build .
        working-directory: ${{ github.workspace }}

      - name: Run Build in Container
        run: |
          docker run --rm -v ${{ github.workspace }}:/app ediromonline-build bash -c "./build.sh"

      - name: Upload XAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: edirom-online-frontend-xar
          path: build-xar/*.xar
