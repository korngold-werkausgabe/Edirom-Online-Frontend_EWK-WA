events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Serve application at the configured path
        location /APP_PATH {
            alias /usr/share/nginx/html/APP_PATH;
            try_files $uri $uri/ /index.html;
        }

        # Handle root redirect if APP_PATH is not /
        location = / {
            return 302 /APP_PATH;
        }

        # Error pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
